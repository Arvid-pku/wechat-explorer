appId: com.wechat-explorer.app
productName: WeChat Explorer
copyright: ""

# We deliberately don't enable asar — the Next.js standalone bundle includes a
# native better-sqlite3 .node binary that needs to live on disk for dlopen to
# work, and asar-unpack rules for nested node_modules are fragile. Skipping
# asar costs us nothing meaningful for a self-distributed local-only app.
asar: false

directories:
  output: release
  buildResources: build

# Only ship the compiled Electron main entry. electron-builder's filter
# pipeline insists on stripping `node_modules/` from extraResources no matter
# the filter expression, so the Next.js standalone tree is copied manually
# by scripts/build-app.sh *after* electron-builder finishes (see the script).
files:
  - "!**/*"
  - electron/dist/**/*
  - package.json

afterPack: scripts/after-pack.js

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  # We only ask electron-builder to produce the raw universal `.app`. The
  # build script then signs it (with xattr cleanup that codesign demands)
  # and builds the .dmg via hdiutil. Doing it this way avoids electron-
  # builder's signing pipeline, which can't reliably ad-hoc sign the
  # @electron/universal lipo-merged Mach-O — the merged binary holds
  # resource-fork leftovers that codesign refuses to overwrite from
  # inside electron-builder's signing step.
  target:
    - target: dir
      arch:
        - universal
  # `identity: null` skips signing inside electron-builder. We sign in
  # scripts/build-app.sh after the universal merge + standalone copy.
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
